<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3000 그림단어책 — 어근 학습 웹앱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F5F0E8;color:#1B3A2D;min-height:100vh;}
a{text-decoration:none;}

/* 네비 */
nav{background:rgba(245,240,232,0.96);backdrop-filter:blur(12px);padding:13px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid rgba(27,58,45,0.12);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:15px;font-weight:700;color:#1B3A2D;}
.nav-insta{padding:7px 14px;border-radius:20px;background:#1B3A2D;color:#fff;font-size:12px;font-weight:600;}

/* 탭 네비 */
.tab-bar{display:flex;background:#E8F0E9;padding:4px;border-radius:14px;margin:16px 16px 0;}
.tab-btn{flex:1;padding:9px 0;border:none;background:transparent;border-radius:10px;font-size:13px;font-weight:600;color:#4A7C59;cursor:pointer;transition:all 0.15s;}
.tab-btn.on{background:#fff;color:#1B3A2D;box-shadow:0 1px 4px rgba(27,58,45,0.12);}

/* 화면 */
.screen{display:none;padding:16px;}
.screen.on{display:block;}

/* 어근 목록 */
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.unit-card{background:#fff;border-radius:14px;border:0.5px solid rgba(27,58,45,0.12);overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.unit-card:hover{transform:scale(1.02);}
.unit-thumb{width:100%;height:100px;object-fit:cover;}
.unit-thumb-placeholder{width:100%;height:100px;background:#E8F0E9;display:flex;align-items:center;justify-content:center;font-size:32px;}
.unit-info{padding:10px 12px;}
.unit-num{font-size:10px;color:#8A9E8D;margin-bottom:3px;}
.unit-root{font-size:18px;font-weight:700;color:#1B3A2D;margin-bottom:2px;}
.unit-nuance{font-size:12px;color:#4A7C59;}

/* 카드 학습 */
.card-wrap{background:#fff;border-radius:16px;border:0.5px solid rgba(27,58,45,0.12);overflow:hidden;margin-bottom:12px;cursor:pointer;}
.card-photo{width:100%;height:200px;object-fit:cover;}
.card-body{padding:16px;}
.card-step{display:none;}
.card-step.on{display:block;}
.card-tag{font-size:10px;font-weight:700;color:#8A9E8D;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;}
.card-root-big{font-size:40px;font-weight:700;color:#1B3A2D;line-height:1.1;margin-bottom:6px;}
.card-latin{font-size:12px;color:#8A9E8D;margin-bottom:10px;}
.card-scene{font-size:14px;color:#4A7C59;line-height:1.7;}
.card-hint{font-size:11px;color:#B0BEB0;text-align:right;margin-top:12px;}
.nuance-big{font-size:42px;font-weight:700;color:#1B3A2D;text-align:center;margin:8px 0 6px;}
.gold-bar{width:36px;height:2.5px;background:#C8A84B;margin:0 auto 8px;}
.nuance-sub{font-size:13px;color:#4A7C59;text-align:center;}
.words-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.word-box{background:#F5F0E8;border-radius:10px;padding:10px 11px;}
.word-en{font-size:13px;font-weight:700;color:#1B3A2D;}
.word-en span{color:#C8A84B;}
.word-ko{font-size:11px;color:#4A7C59;margin-top:3px;}

/* 스텝 도트 */
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:10px;}
.dot{width:6px;height:6px;border-radius:50%;background:#D0D8D0;transition:background 0.2s;}
.dot.on{background:#1B3A2D;}

/* 카드 네비 버튼 */
.card-nav{display:flex;gap:8px;}
.cnav{flex:1;padding:10px;border:0.5px solid rgba(27,58,45,0.2);border-radius:10px;background:#fff;font-size:13px;color:#1B3A2D;cursor:pointer;text-align:center;}
.cnav.primary{background:#1B3A2D;color:#fff;border-color:#1B3A2D;}

/* 퀴즈 */
.quiz-score{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:12px;border:0.5px solid rgba(27,58,45,0.12);}
.score-label{font-size:12px;color:#8A9E8D;}
.score-val{font-size:16px;font-weight:700;color:#1B3A2D;margin-left:auto;}
.prog-wrap{flex:1;height:4px;background:#E8F0E9;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#2C5F2D;border-radius:99px;transition:width 0.3s;}
.quiz-card{background:#fff;border-radius:16px;border:0.5px solid rgba(27,58,45,0.12);overflow:hidden;margin-bottom:12px;}
.quiz-photo{width:100%;height:160px;object-fit:cover;}
.quiz-body{padding:16px;}
.quiz-q{font-size:13px;color:#8A9E8D;margin-bottom:6px;}
.quiz-word{font-size:28px;font-weight:700;color:#1B3A2D;margin-bottom:4px;}
.quiz-word span{color:#C8A84B;}
.quiz-hint{font-size:12px;color:#8A9E8D;margin-bottom:14px;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{padding:12px;border-radius:10px;border:0.5px solid rgba(27,58,45,0.15);background:#F5F0E8;font-size:13px;color:#1B3A2D;cursor:pointer;text-align:center;transition:all 0.15s;}
.opt:hover{border-color:#4A7C59;}
.opt.correct{background:#E8F5E9;border-color:#2C5F2D;color:#1B5E20;font-weight:700;}
.opt.wrong{background:#FFEBEE;border-color:#C62828;color:#B71C1C;}
.quiz-feedback{font-size:13px;color:#4A7C59;margin-top:10px;line-height:1.6;display:none;}
.next-btn{width:100%;padding:12px;border-radius:12px;background:#1B3A2D;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;display:none;margin-top:4px;}
</style>
</head>

<nav>
  <div class="nav-logo">3000 그림단어책</div>
  <a class="nav-insta" href="https://www.instagram.com/stayoungjung" target="_blank">인스타그램 →</a>

<div class="tab-bar">
  <button class="tab-btn on" onclick="switchTab('list',this)">어근 목록</button>

  <button class="tab-btn" onclick="switchTab('quiz',this)">퀴즈</button>
</div>

<!-- 어근 목록 -->

<!-- 카드 학습 -->
<div id="screen-card" class="screen">
  <div class="dots" id="dots"></div>
  <div class="card-wrap" onclick="nextStep()">
    <img id="cardPhoto" class="card-photo" src="" alt="어근 이미지">
    <div class="card-body">
      <!-- step 0: 어근 소개 -->
      <div class="card-step on" id="step0">
        <div class="card-tag" id="s0tag"></div>
        <div class="card-root-big" id="s0root"></div>
        <div class="card-latin" id="s0latin"></div>
        <div class="card-scene" id="s0scene"></div>
        <div class="card-hint">탭해서 핵심 뉘앙스 보기 →</div>
      </div>
      <!-- step 1: 뉘앙스 -->
      <div class="card-step" id="step1">
        <div class="card-tag">핵심 뉘앙스</div>
        <div class="nuance-big" id="s1nuance"></div>
        <div class="gold-bar"></div>
        <div class="nuance-sub" id="s1sub"></div>
        <div class="card-hint" style="margin-top:16px;">탭해서 단어들 보기 →</div>
      </div>
      <!-- step 2: 단어들 -->
      <div class="card-step" id="step2">
        <div class="card-tag" id="s2tag"></div>
        <div class="words-grid" id="wordsGrid"></div>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button class="cnav" onclick="prevUnit()">← 이전</button>
    <button class="cnav primary" onclick="nextStep()">다음 단계</button>
    <button class="cnav" onclick="nextUnit()">다음 →</button>
  </div>
</div>

<!-- 퀴즈 -->
<div id="screen-quiz" class="screen">
  <div class="quiz-score">
    <div class="score-label">정답률</div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="score-val" id="scoreVal">0 / 0</div>
  </div>
  <div class="quiz-card">
    <img id="quizPhoto" class="quiz-photo" src="" alt="어근 힌트 사진">
    <div class="quiz-body">
      <div class="quiz-q">이 사진의 어근 뜻은 무엇일까요?</div>
      <div class="quiz-word" id="quizWord"></div>
      <div class="quiz-hint" id="quizHint"></div>
      <div class="quiz-opts" id="quizOpts"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
    </div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuiz()">다음 문제 →</button>
</div>

let curUnit = 0, curStep = 0;
let quizList = [], quizIdx = 0, score = 0, answered = false;

function highlightRoot(word, rootPart) {
  if(!rootPart) return word;
  const re = new RegExp('(' + rootPart + ')', 'i');
  return word.replace(re, '<span>$1</span>');
}

function renderList() {
  const g = document.getElementById('unitGrid');
  g.innerHTML = CARDS.map((c,i) => `
    <div class="unit-card" onclick="goCard(${i})">
      ${c.photo
        ? `<img class="unit-thumb" src="${c.photo}" alt="${c.root}" onerror="this.style.display='none'">`
        : `<div class="unit-thumb-placeholder">🌱</div>`}
      <div class="unit-info">
        <div class="unit-num">${c.unit}</div>
        <div class="unit-root">${c.root}</div>
        <div class="unit-nuance">${c.meaning}</div>
      </div>
    </div>`).join('');
}

function goCard(i) {
  curUnit = i; curStep = 0;
  switchTab('card', document.querySelectorAll('.tab-btn')[1]);
  renderCard();
}

function renderCard() {
  const c = CARDS[curUnit];
  // 사진
  const ph = document.getElementById('cardPhoto');
  if(c.photo){ ph.src = c.photo; ph.style.display='block'; }
  else { ph.style.display='none'; }
  // 도트
  document.getElementById('dots').innerHTML = [0,1,2].map(i=>
    `<div class="dot ${i===curStep?'on':''}"></div>`).join('');
  // 스텝들 숨기기
  ['step0','step1','step2'].forEach((id,i)=>{
    document.getElementById(id).className = 'card-step' + (i===curStep?' on':'');
  });
  // 내용 채우기
  document.getElementById('s0tag').textContent = c.unit + ' · 어근';
  document.getElementById('s0root').textContent = c.root;
  document.getElementById('s0latin').textContent = c.latin;
  document.getElementById('s0scene').textContent = c.scene;
  document.getElementById('s1nuance').textContent = c.meaning;
  document.getElementById('s1sub').textContent = `'${c.root}'의 단 하나의 본질`;
  document.getElementById('s2tag').textContent = `'${c.meaning}'로 모든 뜻이 풀립니다`;
  document.getElementById('wordsGrid').innerHTML = c.words.map(w=>`
    <div class="word-box">
      <div class="word-en">${highlightRoot(w.en, w.root_part)}</div>
      <div class="word-ko">${w.ko}</div>
    </div>`).join('');
}

function nextStep() {
  curStep = curStep >= 2 ? 0 : curStep + 1;
  renderCard();
}
function prevUnit() { curUnit = curUnit<=0 ? CARDS.length-1 : curUnit-1; curStep=0; renderCard(); }
function nextUnit() { curUnit = curUnit>=CARDS.length-1 ? 0 : curUnit+1; curStep=0; renderCard(); }

function buildQuiz() {
  quizList = [];
  CARDS.forEach(c => {
    c.words.forEach(w => {
      const wrongs = CARDS.filter(x=>x.root!==c.root)
        .sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.meaning);
      const opts = [...wrongs, c.meaning].sort(()=>Math.random()-0.5);
      quizList.push({ word: w.en, root_part: w.root_part, answer: c.meaning, root: c.root, photo: c.photo, unit: c.unit, opts });
    });
  });
  quizList.sort(()=>Math.random()-0.5);
}

function renderQuiz() {
  if(quizIdx >= quizList.length) {
    document.querySelector('.quiz-card').innerHTML = `
      <div style="text-align:center;padding:40px 20px;">
        <div style="font-size:40px;margin-bottom:12px;">🎉</div>
        <div style="font-size:20px;font-weight:700;color:#1B3A2D;margin-bottom:8px;">퀴즈 완료!</div>
        <div style="font-size:15px;color:#4A7C59;">최종 정답률: ${Math.round(score/quizList.length*100)}%</div>
      </div>`;
    document.getElementById('nextBtn').style.display='none';
    return;
  }
  const q = quizList[quizIdx];
  answered = false;
  document.getElementById('nextBtn').style.display='none';
  // 사진
  const qp = document.getElementById('quizPhoto');
  if(q.photo){ qp.src=q.photo; qp.style.display='block'; }
  else { qp.style.display='none'; }
  // 단어 (어근 골드 강조)
  document.getElementById('quizWord').innerHTML = highlightRoot(q.word, q.root_part);
  document.getElementById('quizHint').textContent = q.unit + ' · 어근: ' + q.root;
  document.getElementById('quizFeedback').style.display='none';
  document.getElementById('quizOpts').innerHTML = q.opts.map(o=>`
    <button class="opt" onclick="answerQuiz('${o}','${q.answer}','${q.root}',this)">${o}</button>`).join('');
  // 점수
  const total = quizIdx;
  document.getElementById('scoreVal').textContent = `${score} / ${total}`;
  document.getElementById('progFill').style.width = total>0 ? `${Math.round(score/total*100)}%` : '0%';
}

function answerQuiz(chosen, answer, root, btn) {
  if(answered) return;
  answered = true;
  document.querySelectorAll('.opt').forEach(o=>{
    if(o.textContent===answer) o.classList.add('correct');
    else if(o===btn && chosen!==answer) o.classList.add('wrong');
    o.onclick=null;
  });
  if(chosen===answer) score++;
  const fb = document.getElementById('quizFeedback');
  fb.style.display='block';
  fb.style.color = chosen===answer ? '#2C5F2D' : '#C62828';
  fb.textContent = chosen===answer
    ? `✓ 정답! '${root}'의 핵심 뉘앙스는 '${answer}'입니다.`
    : `✗ '${root}'의 핵심 뉘앙스는 '${answer}'입니다.`;
  document.getElementById('nextBtn').style.display='block';
  const total = quizIdx+1;
  document.getElementById('scoreVal').textContent = `${score} / ${total}`;
  document.getElementById('progFill').style.width = `${Math.round(score/total*100)}%`;
}

function nextQuiz() { quizIdx++; renderQuiz(); }

function switchTab(id, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='card') renderCard();
  if(id==='quiz'){ buildQuiz(); quizIdx=0; score=0; renderQuiz(); }
}

renderList();
</script>
</body>
</html>
