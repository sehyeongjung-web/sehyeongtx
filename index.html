<html lang="ko">

<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#1B3A2D;color:#fff;min-height:100vh;}
nav{background:rgba(27,58,45,0.95);backdrop-filter:blur(12px);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:15px;font-weight:700;color:#fff;}
.nav-insta{padding:7px 14px;border-radius:20px;background:rgba(255,255,255,0.12);color:#fff;font-size:12px;font-weight:600;text-decoration:none;}
.tab-bar{display:flex;padding:12px 16px;gap:8px;}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);}
.tab-btn.on{background:#C8A84B;color:#1B3A2D;}
.screen{display:none;padding:0 16px 40px;}
.screen.on{display:block;}

/* ── 어근 목록 ── */
.list-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.list-card{border-radius:16px;overflow:hidden;cursor:pointer;position:relative;background:#000;transition:transform 0.15s;}
.list-card:hover{transform:scale(1.02);}
.list-photo{width:100%;height:auto;object-fit:contain;display:block;opacity:0.85;background:#111;}
.list-card:hover .list-photo{opacity:0.88;}
.list-overlay{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,0.82));}
.list-unit{font-size:10px;color:rgba(255,255,255,0.55);margin-bottom:3px;}
.list-root{font-size:20px;font-weight:700;color:#fff;}
.list-meaning{font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px;}
.list-hover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;background:rgba(200,168,75,0.12);}
.list-card:hover .list-hover{opacity:1;}
.list-hover-tag{font-size:13px;font-weight:700;color:#C8A84B;background:rgba(0,0,0,0.65);padding:8px 16px;border-radius:20px;}

/* ── 카드 학습 ── */
.card-photo-wrap{position:relative;border-radius:16px;overflow:hidden;margin-bottom:12px;cursor:pointer;}
.card-photo-full{width:100%;height:280px;object-fit:cover;display:block;}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,0.85));}
.step-q{text-align:center;}
.step-q-mark{font-size:40px;font-weight:700;color:#C8A84B;margin-bottom:6px;}
.step-q-text{font-size:15px;color:rgba(255,255,255,0.88);}
.step-q-hint{font-size:12px;color:rgba(255,255,255,0.38);margin-top:8px;}
.step-reveal{text-align:center;}
.step-root-big{font-size:46px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:6px;}
.gold-bar{width:40px;height:3px;background:#C8A84B;margin:8px auto;}
.step-nuance{font-size:20px;font-weight:700;color:#C8A84B;margin-bottom:5px;}
.step-latin{font-size:11px;color:rgba(255,255,255,0.42);margin-bottom:5px;}
.step-scene{font-size:12px;color:rgba(255,255,255,0.58);line-height:1.5;}
.step-words-area{margin-bottom:14px;}
.step-words-title{font-size:11px;font-weight:700;color:#C8A84B;letter-spacing:0.08em;margin-bottom:10px;}
.words-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.word-box{background:rgba(255,255,255,0.07);border-radius:10px;padding:10px 12px;border:0.5px solid rgba(255,255,255,0.1);}
.word-en{font-size:14px;font-weight:700;color:#fff;}
.word-en .root-hl{color:#E74C3C;animation:pulse 0.6s ease;}
.word-ko{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:12px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.2s;}
.dot.on{background:#C8A84B;transform:scale(1.2);}
.card-nav{display:flex;gap:8px;}
.cnav{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;border:0.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);}
.cnav.primary{background:#C8A84B;color:#1B3A2D;border-color:#C8A84B;}

/* ── 퀴즈 ── */
.quiz-score{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border-radius:12px;padding:12px 16px;margin-bottom:12px;border:0.5px solid rgba(255,255,255,0.1);}
.score-label{font-size:12px;color:rgba(255,255,255,0.5);}
.score-val{font-size:16px;font-weight:700;color:#C8A84B;margin-left:auto;}
.prog-wrap{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#C8A84B;border-radius:99px;transition:width 0.35s;}

/* 퀴즈 단계 표시 */
.quiz-steps{display:flex;gap:6px;margin-bottom:12px;justify-content:center;}
.qstep{flex:1;height:4px;border-radius:99px;background:rgba(255,255,255,0.15);transition:background 0.3s;}
.qstep.on{background:#C8A84B;}
.qstep.done{background:rgba(200,168,75,0.4);}
.qstep-label{font-size:11px;color:rgba(255,255,255,0.45);text-align:center;margin-bottom:12px;}

/* 퀴즈 1단계: 사진+어근선택 */
.quiz-photo-wrap{border-radius:16px;overflow:hidden;margin-bottom:12px;}
.quiz-photo-full{width:100%;height:220px;object-fit:cover;display:block;}
.quiz-q-label{font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:10px;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.opt{padding:14px 10px;border-radius:12px;border:0.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);cursor:pointer;text-align:center;transition:all 0.15s;}
.opt:hover{background:rgba(200,168,75,0.2);border-color:#C8A84B;}
.opt-en{font-size:16px;font-weight:700;color:#fff;}
.opt.correct{background:rgba(44,95,45,0.4);border-color:#4A7C59;}
.opt.correct .opt-en{color:#A5D6A7;}
.opt.wrong{background:rgba(192,57,43,0.3);border-color:#C0392B;}
.opt.wrong .opt-en{color:#EF9A9A;}

/* 퀴즈 2단계: 워드패밀리 각인 */
.wf-area{margin-bottom:12px;}
.wf-title{font-size:12px;font-weight:700;color:#C8A84B;letter-spacing:0.08em;margin-bottom:10px;}
.wf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.wf-card{background:rgba(255,255,255,0.07);border-radius:10px;padding:11px 13px;border:0.5px solid rgba(255,255,255,0.1);opacity:0;transform:translateY(8px);transition:all 0.3s;}
.wf-card.show{opacity:1;transform:translateY(0);}
.wf-en{font-size:14px;font-weight:700;color:#fff;}
.wf-en .root-hl{color:#E74C3C;display:inline-block;animation:pulse 0.5s ease;}
.wf-ko{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;}

/* 퀴즈 3단계: 워드패밀리 퀴즈 */
.wfq-area{margin-bottom:12px;}
.wfq-q{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.wfq-korean{font-size:24px;font-weight:700;color:#fff;margin-bottom:14px;}
.wfq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.wfq-opt{padding:12px;border-radius:10px;border:0.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);cursor:pointer;text-align:center;font-size:14px;font-weight:700;color:#fff;transition:all 0.15s;}
.wfq-opt:hover{background:rgba(200,168,75,0.2);border-color:#C8A84B;}
.wfq-opt.correct{background:rgba(44,95,45,0.4);border-color:#4A7C59;color:#A5D6A7;}
.wfq-opt.wrong{background:rgba(192,57,43,0.3);border-color:#C0392B;color:#EF9A9A;}
.wfq-feedback{font-size:13px;color:rgba(255,255,255,0.7);margin-top:8px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.06);display:none;line-height:1.6;}

/* 완료 배지 */
.badge-wrap{text-align:center;padding:28px 0;}
.badge-icon{font-size:56px;margin-bottom:12px;animation:pop 0.4s ease;}
@keyframes pop{0%{transform:scale(0.5)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.badge-title{font-size:22px;font-weight:700;color:#C8A84B;margin-bottom:6px;}
.badge-score{font-size:15px;color:rgba(255,255,255,0.6);}
.badge-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-top:8px;}

.action-btn{width:100%;padding:13px;border-radius:12px;background:#C8A84B;color:#1B3A2D;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:8px;display:none;}
</style>
</head>

</div>

let curUnit=0,curStep=0;
let quizList=[],quizIdx=0,score=0,totalQ=0,wfqIdx=0,wfqScore=0;
let curQ=null, wfqAnswered=false;

function hlRoot(word,root){
  if(!root)return word;
  return word.replace(new RegExp("("+root+")","i"),"<span class=\"root-hl\">$1</span>");
}

// 어근 목록
function renderList(){
  document.getElementById("listGrid").innerHTML=CARDS.map((c,i)=>`
    <div class="list-card" onclick="goCard(${i})">
      <img class="list-photo" src="${c.photo}" alt="${c.root}">
      <div class="list-overlay">
        <div class="list-unit">${c.unit}</div>
        <div class="list-root">${c.root}</div>
        <div class="list-meaning">${c.meaning}</div>
      </div>
      <div class="list-hover"><div class="list-hover-tag">🔍 학습하기</div></div>
    </div>`).join("");
}

function goCard(i){curUnit=i;curStep=0;switchTab("card",document.querySelectorAll(".tab-btn")[1]);renderCard();}

// 카드 학습
function renderCard(){
  const c=CARDS[curUnit];
  document.getElementById("cardPhoto").src=c.photo;
  document.getElementById("dots").innerHTML=[0,1,2].map(i=>`<div class="dot ${i===curStep?"on":""}"></div>`).join("");
  document.getElementById("step0").style.display=curStep===0?"block":"none";
  document.getElementById("step1").style.display=curStep===1?"block":"none";
  document.getElementById("step2").style.display=curStep===2?"block":"none";
  document.getElementById("s1root").textContent=c.root;
  document.getElementById("s1nuance").textContent=c.meaning;
  document.getElementById("s1latin").textContent=c.latin;
  document.getElementById("s1scene").textContent=c.scene;
  document.getElementById("s2title").textContent=`'${c.meaning}'로 모든 뜻이 풀립니다`;
  document.getElementById("wordsGrid").innerHTML=c.words.map(w=>`
    <div class="word-box">
      <div class="word-en">${hlRoot(w.en,w.root_part)}</div>
      <div class="word-ko">${w.ko}</div>
    </div>`).join("");
}
function nextStep(){curStep=curStep>=2?0:curStep+1;renderCard();}
function prevUnit(){curUnit=curUnit<=0?CARDS.length-1:curUnit-1;curStep=0;renderCard();}
function nextUnit(){curUnit=curUnit>=CARDS.length-1?0:curUnit+1;curStep=0;renderCard();}

// 퀴즈 빌드
function buildQuiz(){
  quizList=CARDS.map(c=>{
    const wrongs=CARDS.filter(x=>x.root!==c.root).sort(()=>Math.random()-0.5).slice(0,3);
    const opts=[...wrongs.map(x=>({root:x.root,meaning:x.meaning})),{root:c.root,meaning:c.meaning}].sort(()=>Math.random()-0.5);
    return{photo:c.photo,unit:c.unit,root:c.root,meaning:c.meaning,scene:c.scene,words:c.words,opts};
  }).sort(()=>Math.random()-0.5);
  quizIdx=0;score=0;totalQ=0;
}

function updateScore(){
  document.getElementById("scoreVal").textContent=`${score} / ${totalQ}`;
  document.getElementById("progFill").style.width=totalQ>0?`${Math.round(score/totalQ*100)}%`:"0%";
}

function updateStepBar(phase){
  [0,1,2].forEach(i=>{
    const el=document.getElementById("qs"+i);
    el.className="qstep"+(i===phase?" on":i<phase?" done":"");
  });
  const labels=["1단계 — 사진 보고 어근 찾기","2단계 — 파생어 각인하기","3단계 — 파생어 퀴즈"];
  document.getElementById("qstepLabel").textContent=labels[phase]||"";
}

function startQuiz(){
  if(quizIdx>=quizList.length){showBadge();return;}
  curQ=quizList[quizIdx];
  goQPhase(0);
}

function goQPhase(phase){
  ["qphase0","qphase1","qphase2","qbadge"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById("qphase"+phase).style.display="block";
  updateStepBar(phase);

  if(phase===0){
    // 사진 + 어근 선택
    document.getElementById("quizPhoto").src=curQ.photo;
    document.getElementById("quizLabel").textContent=curQ.unit+" · 이 장면의 어근은?";
    document.getElementById("q0feedback").style.display="none";
    document.getElementById("q0next").style.display="none";
    document.getElementById("quizOpts").innerHTML=curQ.opts.map(o=>`
      <div class="opt" onclick="answerRoot('${o.root}',this)">
        <div class="opt-en">${o.root}</div>
      </div>`).join("");
  }
  else if(phase===1){
    // 워드패밀리 각인 — 카드 순서대로 등장
    document.getElementById("wfTitle").innerHTML=`<span class="root-hl">${curQ.root}</span> = ${curQ.meaning} · 파생어 각인`;
    const grid=document.getElementById("wfGrid");
    grid.innerHTML=curQ.words.map(w=>`
      <div class="wf-card">
        <div class="wf-en">${hlRoot(w.en,w.root_part)}</div>
        <div class="wf-ko">${w.ko}</div>
      </div>`).join("");
    // 순서대로 나타나는 애니메이션
    const cards=grid.querySelectorAll(".wf-card");
    cards.forEach((c,i)=>setTimeout(()=>c.classList.add("show"),i*180));
  }
  else if(phase===2){
    // 워드패밀리 퀴즈
    wfqIdx=0; wfqScore=0; wfqAnswered=false;
    renderWFQ();
  }
}

function answerRoot(chosen,el){
  const ok=chosen===curQ.root;
  totalQ++;
  if(ok)score++;
  updateScore();
  document.querySelectorAll(".opt").forEach(o=>{
    const r=o.querySelector(".opt-en").textContent;
    if(r===curQ.root)o.classList.add("correct");
    else if(o===el&&!ok)o.classList.add("wrong");
    o.onclick=null;
  });
  const fb=document.getElementById("q0feedback");
  fb.style.display="block";
  fb.style.background=ok?"rgba(44,95,45,0.2)":"rgba(192,57,43,0.2)";
  fb.textContent=ok?`✓ 정답! ${curQ.root} = ${curQ.meaning}`:`✗ 정답은 ${curQ.root} (${curQ.meaning})`;
  document.getElementById("q0next").style.display="block";
}

// 워드패밀리 퀴즈
function renderWFQ(){
  document.getElementById("wfqFeedback").style.display="none";
  document.getElementById("q2next").style.display="none";
  wfqAnswered=false;
  if(wfqIdx>=curQ.words.length){
    // 이 어근 완료
    document.getElementById("q2next").style.display="block";
    document.getElementById("q2next").textContent=
      quizIdx+1>=quizList.length?"결과 보기 →":"다음 어근 →";
    document.getElementById("wfqKorean").textContent="이 어근 완료! 🎉";
    document.getElementById("wfqOpts").innerHTML="";
    return;
  }
  const w=curQ.words[wfqIdx];
  document.getElementById("wfqKorean").textContent=w.ko;
  // 보기: 같은 카드의 다른 단어 + 정답
  const others=curQ.words.filter((_,i)=>i!==wfqIdx).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.en);
  const opts=[...others,w.en].sort(()=>Math.random()-0.5);
  totalQ++;
  document.getElementById("wfqOpts").innerHTML=opts.map(o=>`
    <div class="wfq-opt" onclick="answerWFQ('${o.replace(/'/g,"\'")}','${w.en.replace(/'/g,"\'")}','${(w.root_part||"").replace(/'/g,"\'")}',this)">${o}</div>`).join("");
}

function answerWFQ(chosen,answer,rootPart,el){
  if(wfqAnswered)return;
  wfqAnswered=true;
  const ok=chosen===answer;
  if(ok)score++;
  updateScore();
  document.querySelectorAll(".wfq-opt").forEach(o=>{
    if(o.textContent===answer)o.classList.add("correct");
    else if(o===el&&!ok)o.classList.add("wrong");
    o.onclick=null;
  });
  const fb=document.getElementById("wfqFeedback");
  fb.style.display="block";
  fb.innerHTML=ok
    ?`✓ 정답! <strong>${hlRoot(answer,rootPart)}</strong> = ${curQ.words[wfqIdx].ko}`
    :`✗ 정답은 <strong>${hlRoot(answer,rootPart)}</strong> = ${curQ.words[wfqIdx].ko}`;
  setTimeout(()=>{wfqIdx++;wfqAnswered=false;renderWFQ();},1200);
}

function nextQuiz(){
  quizIdx++;
  if(quizIdx>=quizList.length){showBadge();return;}
  curQ=quizList[quizIdx];
  goQPhase(0);
}

function showBadge(){
  ["qphase0","qphase1","qphase2"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById("qbadge").style.display="block";
  const pct=totalQ>0?Math.round(score/totalQ*100):0;
  const icon=pct>=90?"🏆":pct>=70?"🥈":pct>=50?"🥉":"📚";
  const title=pct>=90?"어근 마스터!":pct>=70?"아주 잘했어요!":pct>=50?"좋은 시작이에요!":"다시 한번 도전해봐요!";
  document.getElementById("badgeIcon").textContent=icon;
  document.getElementById("badgeTitle").textContent=title;
  document.getElementById("badgeScore").textContent=`정답률 ${pct}% (${score}/${totalQ})`;
  document.getElementById("qstepLabel").textContent="퀴즈 완료!";
  [0,1,2].forEach(i=>document.getElementById("qs"+i).className="qstep done");
}

function switchTab(id,btn){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById("screen-"+id).classList.add("on");
  btn.classList.add("on");
  if(id==="card"){curStep=0;renderCard();}
  if(id==="quiz"){buildQuiz();startQuiz();}
}

renderList();
</script>
